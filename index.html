<!DOCTYPE html>
<html>
<head>
  <title>WhatsApp Embedded Signup</title>
  <meta charset="UTF-8">
</head>
<body>
  <h1>WhatsApp Business Setup</h1>
  <button onclick="launchWhatsAppSignup()">Connect WhatsApp Business</button>
  
  <div id="result" style="margin-top: 20px; padding: 10px; border: 1px solid #ccc;"></div>

  <script>
    window.fbAsyncInit = function() {
      FB.init({
        appId: '1723177782006815',
        cookie: true,
        xfbml: true,
        version: 'v20.0'
      });
    };

    function launchWhatsAppSignup() {
      FB.login(function(response) {
        if (response.authResponse) {
          const code = response.authResponse.code;
          document.getElementById('result').innerHTML = 
            '<strong>✅ Success! Your Authorization Code:</strong><br><br>' + 
            '<textarea style="width:100%; height:100px;">' + code + '</textarea>' +
            '<br><br>Copy this code and save it!';
        } else {
          document.getElementById('result').innerHTML = '❌ Login cancelled';
        }
      }, {
        config_id: '1021884717078968',
        response_type: 'code',
        override_default_response_type: true,
        extras: {
          setup: {},
          sessionInfoVersion: 2
        }
      });
    }
  </script>

  <script async defer crossorigin="anonymous" 
    src="https://connect.facebook.net/en_US/sdk.js">
  </script>
</body>
</html>
